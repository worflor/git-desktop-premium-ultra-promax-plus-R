name: git_desktop
description: Your Personal Git Client
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  window_manager: ^0.3.9
  shared_preferences: ^2.3.2
  path: ^1.9.0
  flutter_svg: ^2.0.10+1
  file_picker: ^8.1.4
  # Renders GitHub-flavored markdown in PR/issue comment bodies.
  # Without this the codex-style review comments show as raw text
  # (`### Codex Review`, `**Reviewed commit**`, etc).
  flutter_markdown: ^0.7.4
  # Bond — decentralised P2P collaboration.
  #   cryptography: Ed25519 signing, HKDF, AEADs. Pure Dart so the
  #                 identity + transport layers have no native hazards.
  #   pointycastle: Argon2id for phrase → master seed hardening.
  #                 `cryptography` doesn't ship Argon2.
  #   cbor:         deterministic serialisation for signed objects
  #                 (proposals, attestations, anchors, policies).
  cryptography: ^2.7.0
  pointycastle: ^3.9.1
  cbor: ^6.2.0
  # flutter_secure_storage was tried for OS-keychain auto-unlock but
  # the Windows plugin (^9.2.x) has a broken include path that
  # prevents the desktop build. Until that ships fixed, BondService's
  # auto-unlock path is in code but gated on a no-op stub — users
  # type the phrase each launch.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
        - asset: assets/fonts/DMSans-Italic-Variable.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
        - asset: assets/fonts/DMSans-Italic-Variable.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-Variable.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-Variable.ttf
          style: italic
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic-Variable.ttf
          style: italic
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Variable.ttf
        - asset: assets/fonts/Lora-Italic-Variable.ttf
          style: italic
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
  shaders:
    - shaders/cellshade.frag
    - shaders/iridescent.frag
    - shaders/glass.frag
