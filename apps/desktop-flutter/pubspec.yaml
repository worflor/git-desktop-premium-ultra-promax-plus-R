name: git_desktop
description: Your Personal Git Client
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  window_manager: ^0.3.9
  shared_preferences: ^2.3.2
  path: ^1.9.0
  flutter_svg: ^2.0.10+1
  file_picker: ^8.1.4
  # Renders GitHub-flavored markdown in PR/issue comment bodies.
  # Without this the codex-style review comments show as raw text
  # (`### Codex Review`, `**Reviewed commit**`, etc).
  flutter_markdown: ^0.7.4
  # Used by logos_git.dart for @visibleForTesting annotations. Pins the
  # transitive dep as a direct dep so it's legal to import.
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # Alexandria engram — 225 GloVe-300 seeded semantic wells used by
    # logos_hunks.dart's engram-backed H_sym axis. Stripped of sum_raw
    # to halve the bundle size; see tools/export_engram_assets.py.
    # The companion `alexandria.manifest.json` ships in the assets
    # directory for diagnostic purposes but is NOT bundled — runtime
    # only needs the .endb binary.
    - assets/engram/alexandria.endb
    # Quantised GloVe-300 vocabulary (int16 with global scale=6.0).
    # ~11MB. Looked up via engram_glove.dart for per-sub-token vectors.
    - assets/engram/glove300.bin
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
        - asset: assets/fonts/DMSans-Italic-Variable.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
        - asset: assets/fonts/DMSans-Italic-Variable.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-Variable.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-Variable.ttf
          style: italic
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic-Variable.ttf
          style: italic
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Variable.ttf
        - asset: assets/fonts/Lora-Italic-Variable.ttf
          style: italic
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
  shaders:
    - shaders/cellshade.frag
    - shaders/iridescent.frag
    - shaders/dark_iridescent.frag
    - shaders/loverboy_bg.frag
    - shaders/glass.frag
    - shaders/plastic.frag
    - shaders/topology_starfield.frag
