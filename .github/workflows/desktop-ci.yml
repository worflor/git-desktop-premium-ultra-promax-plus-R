name: Desktop CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  desktop-checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck --workspace apps/desktop

      - name: Pretext fixture gate
        run: npm run pretext:fixtures --workspace apps/desktop

      - name: Frontend build
        run: npm run build --workspace apps/desktop

      - name: Git compatibility fixture suite
        working-directory: apps/desktop/src-tauri
        run: cargo test fixture_ -- --nocapture

      - name: Backend formatting check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: Backend test suite
        working-directory: apps/desktop/src-tauri
        run: cargo test -- --nocapture

      - name: Backend compile check
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Backend clippy check
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets
